<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .container{
            display: grid;

            grid-template-columns: 1fr 3fr;

            grid-template-rows: 80px 400px 80px;

            gap: 10px;
            width: 90%;
            margin: 20px auto;
        }

        .header{
            grid-column: 1 / 3;
            background: #3498db;
            color: white;
            text-align: center;
            line-height: 80px;
            font-size: 28px;
        }

        .sidebar{
            background: #2ecc71;
            color: white;
            text-align: center;
            line-height: 400px;
            font-size: 24px;
        }

        .content{
            background: #e67e22;
            color: white;
            text-align: center;
            line-height: 400px;
            font-size: 24px;
        }

        .footer{
            grid-column: 1 / 3;
            background: #34495e;
            color: white;
            text-align: center;
            line-height: 80px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">Header</div>

        <div class="sidebar">Sidebar</div>

        <div class="content">Content Area</div>

        <div class="footer">Footer</div>

    </div>

</body>
</html>
