<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            text-decoration: none;
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container{
            width: 380px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border-radius: 15px;
            background: linear-gradient(135deg, #d2a679, #8b5a2b);

        }
        .container h2{
            text-align: center;
            margin-bottom: 25px;
            color: #5C3B1E;
        }
        .input-box{
            margin-bottom: 18px;
        }

        .input-box label{
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
        }

        .input-box input,
        .input-box select{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }
        .input-box input:focus,
        .input-box select:focus{
            border-color: #8B5A2B;
            box-shadow: 0 0 5px rgba(139,90,43,0.5);
        }

        label{
            font-weight: bold;
        }
        .gender{
            display: flex;
            text-align: center;
            justify-content: left;
            gap: 15px;
            margin-top: 8px;
            margin-bottom: 8px;
            margin-left: 5px;

            
        }

        .btn{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #8B5A2B;
            font-size: 16px;
            color: #fff;
            transition: 0.3s;
        }

        .btn:hover{
            background: #5C3B1E;
        }

        .login-links{
            /* text-align: center; */
            margin-top: 8px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        } 
        p a{
            color: #ddd;
            font-size: 16px;
            transition: ease-in 0.3s;
        }

        p:hover{
            color: #fff;
            text-shadow: 0 0 10px rgba(142, 92, 51, 0.8),
                        0 0 10px #333;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    
    <div class="container">
        <h2>Create Account</h2>
    
        <form action="">
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Enter Your Name" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Enter Your Email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required> 
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tal" placeholder="Enter Phone Number">
            </div>

                <label>Gender</label>

                <div class="gender">
                    <label><input type="radio" name="gender">Male</label>
                    <label><input type="radio" name="gender">Female</label>
                </div>

            <div class="input-box">
                <label>Country</label>
                <select>
                    <option>USA</option>
                    <option>India</option>
                    <option>England</option>
                    <option>South Africa</option>
                </select>
            </div>

            <button class="btn">Register</button>

            <div class="login-links">
                Already have an account?
                <p> <a href="login.html"> Login</a></p>
            </div>
        </form>
    
    </div>

</body>
</html>
