<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Methods UI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.payment-box{
    width:450px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.payment-box h2{
    text-align:center;
    margin-bottom:25px;
}

.product{
    background:#f1f1f1;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.product h3{
    margin-bottom:8px;
}


.payment-option{
    border:2px solid #ddd;
    border-radius:10px;
    margin-top:15px;
    overflow:hidden;
}

.payment-header{
    padding:15px;
    cursor:pointer;
    background:#fff;
    transition:.3s;
}

.payment-header:hover{
    background:#fafafa;
}

.payment-content{
    display:none;
    padding:15px;
    background:#f9f9f9;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

.row{
    display:flex;
    gap:10px;
}

.pay-btn{
    width:100%;
    padding:13px;
    border:none;
    background:#ff6b00;
    color:white;
    font-size:17px;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
}

.pay-btn:hover{
    background:black;
}

</style>
</head>
<body>

<div class="payment-box">

    <h2>Payment Methods</h2>

    <!-- CARD PAYMENT -->

    <div class="payment-option">

        <div class="payment-header"
        onclick="togglePayment('card')">

            💳 Credit / Debit Card

        </div>

        <div class="payment-content" id="card">

            <input type="text"
            placeholder="Card Holder Name">

            <input type="text"
            placeholder="Card Number">

            <div class="row">

                <input type="text"
                placeholder="MM/YY">

                <input type="password"
                placeholder="CVV">

            </div>

            <button class="pay-btn">
                Pay Now
            </button>

        </div>

    </div>

    <!-- UPI -->

    <div class="payment-option">

        <div class="payment-header"
        onclick="togglePayment('upi')">

            📱 UPI Payment

        </div>

        <div class="payment-content" id="upi">

            <input type="text"
            placeholder="Enter UPI ID">

            <button class="pay-btn">
                Verify & Pay
            </button>

        </div>

    </div>

    <!-- NET BANKING -->

    <div class="payment-option">

        <div class="payment-header"
        onclick="togglePayment('bank')">

             Net Banking

        </div>

        <div class="payment-content" id="bank">

            <input type="text"
            placeholder="Bank Name">

            <input type="text"
            placeholder="Account Number">

            <button class="pay-btn">
                Continue
            </button>

        </div>

    </div>

    <!-- COD -->

    <div class="payment-option">

        <div class="payment-header"
        onclick="togglePayment('cod')">

            💵 Cash On Delivery

        </div>

        <div class="payment-content" id="cod">

            <p>
                Your order will be paid at delivery time.
            </p>

            <button class="pay-btn">
                Place Order
            </button>

        </div>

    </div>

    <!-- WALLET -->

    <div class="payment-option">

        <div class="payment-header"
        onclick="togglePayment('wallet')">

             Wallet Payment

        </div>

        <div class="payment-content" id="wallet">

            <input type="text"
            placeholder="Wallet Number">

            <button class="pay-btn">
                Pay with Wallet
            </button>

        </div>

    </div>

</div>

<script>

function togglePayment(id){

    let content = document.getElementById(id);

    if(content.style.display === "block"){

        content.style.display = "none";

    }

    else{

        content.style.display = "block";

    }

}

</script>

</body>
</html>
