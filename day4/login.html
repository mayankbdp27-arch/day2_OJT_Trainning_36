<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Page</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;

}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    /* background:linear-gradient(135deg,#c7b0ed,#4a00e0); */
    /* background: linear-gradient(135deg, #d2a679, #8b5a2b); */    
}

.login-box{
    width:350px;
    background:#fff;
    padding:35px;
    border-radius:10px;
    /* background: linear-gradient(135deg, #5c3b1e, #2b1a0d); */
    background: linear-gradient(135deg, #d2a679, #8b5a2b);
    opacity: 90%;
    box-shadow:0 10px 25px rgba(0,0,0,0.2); 
}
.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#222;
}
.social{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.social button{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    background:#fff;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    transition: ease-in 0.3s;
    font-weight: 600;
}

.social button:hover{
    background:#f5f5f5;
    transform: scale(1.1);
}

.social i{
    margin-right:8px;
}

.or{
    text-align:center;
    margin:18px 0;
    color:#777;
    position:relative;
}

.or::before{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#ccc;
    left:0;
    top:50%;
}

.or::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#ccc;
    right:0;
    top:50%;
}

.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:13px 40px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
    font-size:15px;
}

.input-box i{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    /* color:#7b2ff7; */
    color: #222;
}

.input-box .left{
    left:12px;
}

.input-box .right{
    right:12px;
    cursor:pointer;
}

.forgot{
    display:block;
    margin-bottom:18px;
    /* color:#7b2ff7; */
    color: #fff;
    text-decoration:none;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:13px;
    border:none;
    /* background:#6c3df4; */
    background:linear-gradient(135deg,#6f4e37,#4b2e2e);
    color:#fff;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    /* background:#512bd4; */
    background:linear-gradient(135deg,#4b2e2e,#2c1810);
}

.signup{
    text-align:center;
    margin-top:20px;
    font-size:15px;
    font-weight: 500    ;
}

.signup a{
    /* color:#6c3df4; */
    color: #fff;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="login-box">

    <h2>Log in with</h2>

    <div class="social">

        <button>
            <i class="fa-brands fa-google"></i>
            Google
        </button>

        <button>
            <i class="fa-brands fa-apple"></i>
            Apple
        </button>

    </div>

    <div class="or">or</div>
    <div class="input-box">

        <i class="fa-regular fa-envelope left"></i>
        <input type="email" placeholder="Email address">

    </div>

    <div class="input-box">

        <i class="fa-solid fa-lock left"></i>
        <input type="password" placeholder="Password">

    </div>

    <a href="#" class="forgot">Forgot Password?</a>

    <button class="login-btn">Log In</button>

    <div class="signup">

        Don,t have an account?
        <a href="register.html">Sign up</a>

    </div>
</div>
</body>
</html>
